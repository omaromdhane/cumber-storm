name: Unpublish from npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to unpublish (e.g. 1.2.3)'
        type: string
        required: true

jobs:
  unpublish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Unpublish @cumberstorm/core@${{ inputs.version }}
        run: npm unpublish @cumberstorm/core@${{ inputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: echo "✓ Unpublished @cumberstorm/core@${{ inputs.version }}"
